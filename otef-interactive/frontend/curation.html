<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>OTEF Curation</title>
    <link rel="stylesheet" href="css/remote-styles.css" />
    <style>
      .curation-layout {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
        height: 100vh;
        height: 100dvh;
      }
      .curation-header {
        flex-shrink: 0;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        padding: var(--spacing-unit);
      }
      .curation-header .header-content {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        max-width: 1400px;
        margin: 0 auto;
      }
      .curation-header .header-content .remote-title {
        justify-self: center;
        grid-column: 2;
      }
      .curation-header .header-content #curationRefresh {
        justify-self: end;
      }
      .curation-body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
      .curation-sidebar {
        width: 100%;
        max-width: 640px;
        margin: 0 auto;
        padding: var(--spacing-unit);
        box-sizing: border-box;
      }
      .curation-section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--spacing-unit);
        margin-bottom: 6px;
      }
      .curation-section-head-actions {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .curation-workshop-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        cursor: pointer;
        user-select: none;
        white-space: nowrap;
      }
      .curation-workshop-label input {
        margin: 0;
        cursor: pointer;
      }
      .curation-section-head h2 {
        margin-bottom: 0;
      }
      .curation-publish-actions {
        margin-top: 8px;
      }
      .curation-section {
        margin-bottom: var(--spacing-unit);
      }
      .curation-section:last-child {
        margin-bottom: 0;
      }
      .curation-section h2 {
        font-size: 11px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .curation-select {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        background: var(--bg-tertiary);
        color: var(--text-primary);
        font-size: 14px;
      }
      .curation-select:focus {
        outline: none;
        border-color: var(--accent-primary);
      }
      .curation-features {
        max-height: 200px;
        overflow-y: auto;
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        background: var(--bg-tertiary);
      }
      @media (max-width: 899px) {
        .curation-published-layers.curation-features {
          max-height: none;
          overflow-y: visible;
        }
      }
      @media (min-width: 900px) {
        .curation-features {
          max-height: 240px;
        }
      }
      .curation-published-layers {
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 0;
      }
      .curation-published-layers > .curation-status {
        padding: 10px 12px;
      }
      .curation-published-layer-card {
        display: flex;
        align-items: stretch;
        gap: 10px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border-color);
        text-align: start;
        transition: background-color 0.12s ease;
      }
      .curation-published-layer-card:last-child {
        border-bottom: none;
      }
      .curation-published-layer-card:hover {
        background: var(--bg-secondary);
      }
      .curation-published-layer-body {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
      }
      .curation-published-layer-main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      button.curation-published-layer-main {
        border: none;
        background: transparent;
        padding: 0;
        margin: 0;
        font: inherit;
        color: inherit;
        text-align: inherit;
        cursor: pointer;
        width: 100%;
        align-items: stretch;
      }
      button.curation-published-layer-main:focus-visible {
        outline: 2px solid var(--accent, #00d4ff);
        outline-offset: 2px;
      }
      .curation-published-layer-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        line-height: 1.35;
        word-break: break-word;
      }
      .curation-published-layer-meta-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px 10px;
        font-size: 12px;
        color: var(--text-muted);
      }
      .curation-published-layer-updated {
        font-variant-numeric: tabular-nums;
      }
      .curation-published-layer-color {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-secondary);
      }
      .curation-published-layer-swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid var(--border-color);
        flex-shrink: 0;
        box-sizing: border-box;
      }
      .curation-published-layer-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .curation-published-layer-remove {
        flex-shrink: 0;
        margin-top: 2px;
      }
      .curation-publish-btn {
        padding: 12px 16px;
        margin-top: 0;
        border: none;
        border-radius: var(--border-radius);
        background: var(--accent-primary);
        color: var(--bg-primary);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .curation-publish-btn:hover:not(:disabled) {
        filter: brightness(1.1);
      }
      .curation-publish-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .curation-status {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 8px;
      }
      .curation-status.error {
        color: var(--error-color);
      }
      .curation-status.success {
        color: var(--success-color);
      }
      .curation-header-btn {
        padding: 8px 14px;
        font-size: 13px;
        border-radius: var(--border-radius);
        border: 1px solid var(--border-color);
        background: var(--bg-tertiary);
        color: var(--text-primary);
        cursor: pointer;
      }
      .curation-header-btn:hover {
        border-color: var(--accent-primary);
        color: var(--accent-primary);
      }
      .curation-header-btn.back {
        justify-self: start;
      }
      .curation-header-btn + .curation-header-btn {
        margin-left: 8px;
      }
      a.curation-header-btn {
        text-decoration: none;
        display: inline-block;
      }
      .curation-submission-combo {
        position: relative;
        width: 100%;
      }
      .curation-submission-combo-field {
        position: relative;
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        background: var(--bg-tertiary);
        box-sizing: border-box;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .curation-submission-combo--open .curation-submission-combo-field {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
        border-bottom-color: transparent;
      }
      .curation-submission-search {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 0;
        background: transparent;
        color: var(--text-primary);
        font-size: 14px;
        box-sizing: border-box;
      }
      .curation-submission-search:focus {
        outline: none;
        box-shadow: inset 0 0 0 1px var(--accent-primary);
      }
      .curation-submission-combo--open .curation-submission-search:focus {
        box-shadow: none;
      }
      .curation-submission-combo--open .curation-submission-combo-field:focus-within {
        box-shadow: inset 0 0 0 1px var(--accent-primary);
      }
      .curation-submission-selected-tags {
        display: none;
        flex-wrap: nowrap;
        gap: 6px;
        align-items: center;
        padding: 0;
        border-top: none;
      }
      /* Closed combobox: type tags on first row, full submission name wraps below (no ellipsis) */
      .curation-submission-combo:not(.curation-submission-combo--open)
        .curation-submission-combo-field.has-selected-tags {
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        padding: 8px 10px;
      }
      .curation-submission-combo:not(.curation-submission-combo--open)
        .curation-submission-combo-field.has-selected-tags
        .curation-submission-search {
        flex: 0 0 auto;
        width: 100%;
        min-width: 0;
        padding: 2px 0 0;
        order: 2;
        white-space: normal;
        word-break: break-word;
        overflow-wrap: anywhere;
        overflow: visible;
        text-overflow: clip;
        text-align: start;
      }
      .curation-submission-combo:not(.curation-submission-combo--open)
        .curation-submission-combo-field.has-selected-tags
        .curation-submission-selected-tags {
        display: flex;
        flex-wrap: wrap;
        flex: 0 0 auto;
        width: 100%;
        max-width: none;
        min-width: 0;
        order: 1;
        gap: 4px;
        justify-content: flex-start;
        align-items: center;
        overflow: visible;
      }
      .curation-submission-combo:not(.curation-submission-combo--open)
        .curation-submission-combo-field.has-selected-tags
        .curation-submission-selected-tags
        .curation-chip {
        flex-shrink: 0;
        padding: 2px 6px;
        font-size: 10px;
        font-weight: 600;
        line-height: 1.15;
      }
      .curation-submission-combo--open .curation-submission-selected-tags {
        display: none !important;
      }
      .curation-submission-list {
        display: none;
        position: absolute;
        left: 0;
        right: 0;
        z-index: 50;
        max-height: 220px;
        overflow-y: auto;
        overflow-x: hidden;
        border: 1px solid var(--border-color);
        border-top: none;
        border-radius: 0 0 var(--border-radius) var(--border-radius);
        background: var(--bg-tertiary);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      }
      .curation-submission-combo--open .curation-submission-list {
        display: block;
      }
      @media (min-width: 900px) {
        .curation-submission-list {
          max-height: 260px;
        }
      }
      .curation-submission-option {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-bottom: 1px solid var(--border-color);
        background: transparent;
        color: var(--text-primary);
        font-size: 14px;
        text-align: left;
        cursor: pointer;
        box-sizing: border-box;
        transition: background-color 0.15s ease;
      }
      .curation-submission-option:last-child {
        border-bottom: none;
      }
      .curation-submission-option:hover {
        background: var(--bg-secondary);
      }
      .curation-submission-option--active {
        background: var(--bg-secondary);
        border-left: 3px solid var(--accent-primary);
        padding-left: 9px;
      }
      .curation-submission-option-head {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        width: 100%;
        min-width: 0;
      }
      .curation-submission-option-swatch,
      .curation-submission-selected-swatch {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        border: 1px solid var(--border-color);
        flex-shrink: 0;
        margin-top: 3px;
        box-sizing: border-box;
      }
      .curation-submission-selected-swatch {
        margin-top: 1px;
      }
      .curation-submission-option-title {
        font-weight: 500;
        line-height: 1.3;
        word-break: break-word;
        flex: 1;
        min-width: 0;
      }
      .curation-submission-option-chips,
      .curation-submission-summary-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .curation-chip {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1.2;
        border: 1px solid var(--border-color);
        background: var(--bg-tertiary);
        color: var(--text-secondary);
      }
      .curation-chip-history {
        border-color: rgba(180, 180, 200, 0.4);
        background: rgba(120, 120, 160, 0.15);
        color: var(--text-muted);
      }
      .curation-chip-type.type-moreshet {
        border-color: rgba(0, 212, 255, 0.35);
        background: rgba(0, 212, 255, 0.12);
        color: #9beeff;
      }
      .curation-chip-type.type-memorial {
        border-color: rgba(255, 140, 80, 0.35);
        background: rgba(255, 140, 80, 0.12);
        color: #ffd0b5;
      }
      .curation-chip-type.type-multiple {
        border-color: rgba(255, 200, 0, 0.35);
        background: rgba(255, 200, 0, 0.12);
        color: #ffe999;
      }
    </style>
  </head>
  <body>
    <div class="curation-layout">
      <header class="curation-header">
        <div class="header-content">
          <a href="remote-controller.html" id="curationBack" class="curation-header-btn back" aria-label="Open controller">Controller</a>
          <h1 class="remote-title">Curation</h1>
          <button type="button" id="curationRefresh" class="curation-header-btn">
            Refresh
          </button>
        </div>
      </header>

      <div class="curation-body">
        <aside class="curation-sidebar">
          <section class="curation-section">
            <h2>Submissions</h2>
            <div id="curationSubmissionCombo" class="curation-submission-combo">
              <input type="hidden" id="curationSubmission" name="curationSubmission" value="" />
              <div id="curationSubmissionComboField" class="curation-submission-combo-field">
                <input
                  type="search"
                  id="curationSubmissionSearch"
                  class="curation-submission-search"
                  placeholder="Search or choose submission…"
                  autocomplete="off"
                  dir="auto"
                  role="combobox"
                  aria-expanded="false"
                  aria-controls="curationSubmissionList"
                  aria-autocomplete="list"
                  aria-label="Search and select submission"
                />
                <div
                  id="curationSubmissionSelectedTags"
                  class="curation-submission-selected-tags"
                  aria-hidden="true"
                ></div>
              </div>
              <div
                id="curationSubmissionList"
                class="curation-submission-list"
                role="listbox"
                aria-label="Submissions"
                hidden
              ></div>
            </div>
          </section>

          <section class="curation-section">
            <h2>Publish</h2>
            <div class="curation-publish-actions">
              <button
                type="button"
                id="curationPublish"
                class="curation-publish-btn"
                disabled
              >
                Publish as OTEF layer
              </button>
            </div>
            <div id="curationStatus" class="curation-status"></div>
          </section>

          <section class="curation-section">
            <div class="curation-section-head">
              <h2>Published layers on remote</h2>
              <div class="curation-section-head-actions">
                <label class="curation-workshop-label">
                  <input
                    type="checkbox"
                    id="curationWorkshopAutoPublish"
                    aria-label="Workshop auto-publish"
                  />
                  Workshop auto-publish
                </label>
                <button type="button" id="curationUnpublishAll" class="curation-header-btn">
                  Unpublish all
                </button>
              </div>
            </div>
            <div id="curationPublishedLayers" class="curation-published-layers curation-features">
              <div class="curation-status">Loading published curated layers…</div>
            </div>
          </section>
        </aside>
      </div>
    </div>

    <script src="https://unpkg.com/proj4@2.9.0/dist/proj4.js"></script>
    <script type="module" src="./src/entries/curation-main.js"></script>
  </body>
</html>
