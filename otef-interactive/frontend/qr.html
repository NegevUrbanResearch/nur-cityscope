<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTEF — שלט רחוק להקרנה</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/remote-styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --qr-print-pad: 14px;
            --font-ui: "Heebo", "Noto Sans Hebrew", "Segoe UI", sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            min-height: 100dvh;
            box-sizing: border-box;
            overflow: auto;
            background: radial-gradient(circle at center, #151520 0%, #0a0a0f 100%);
            font-family: var(--font-ui);
        }

        .qr-page {
            width: 100%;
            max-width: 420px;
        }

        .qr-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 36px 32px 32px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .headline {
            margin: 0 0 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
        }

        .tagline {
            margin: 0 0 24px;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .qr-wrap {
            display: flex;
            justify-content: center;
            margin: 0 0 20px;
        }

        #qrcode {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0 0 24px rgba(0, 0, 0, 0.2);
        }

        #qrcode img,
        #qrcode canvas {
            display: block;
            vertical-align: top;
        }

        .net-note {
            font-size: 0.95rem;
            font-weight: 500;
            line-height: 1.55;
            color: var(--text-secondary);
        }

        .url-foot {
            margin-top: 16px;
            font-size: 0.7rem;
            line-height: 1.4;
            color: var(--text-muted);
            word-break: break-all;
            opacity: 0.85;
            font-weight: 400;
            font-family: ui-monospace, "Cascadia Mono", "Consolas", monospace;
            direction: ltr;
            unicode-bidi: isolate;
        }

        @media print {
            @page {
                size: a4;
                margin: 15mm;
            }

            * {
                animation: none !important;
            }

            body {
                background: #fff !important;
                padding: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .qr-page {
                max-width: none;
            }

            .qr-card {
                max-width: 88mm;
                margin: 0 auto;
                padding: 10mm 8mm 10mm;
                background: #fff;
                border: 1px solid #999;
                border-radius: 4px;
                box-shadow: none;
                backdrop-filter: none;
            }

            .headline {
                color: #111;
            }

            .tagline,
            .net-note {
                color: #333;
            }

            .url-foot {
                color: #555;
            }

            #qrcode {
                box-shadow: none;
                border: 1px solid #ddd;
            }

            .qr-wrap {
                margin-bottom: 5mm;
            }

            #qrcode {
                padding: var(--qr-print-pad);
            }

            #qrcode img,
            #qrcode canvas {
                width: 45mm !important;
                height: 45mm !important;
            }
        }
    </style>
</head>
<body>
    <div class="qr-page">
        <div class="qr-card">
            <h1 class="headline">שלט רחוק להקרנה</h1>
            <p class="tagline">סרקו את הקוד לפתיחת השלט</p>

            <div class="qr-wrap">
                <div id="qrcode" role="img" aria-label="קוד QR לפתיחת השלט"></div>
            </div>

            <p class="net-note">ודאו שאתם מחוברים <strong>ל־Wi‑Fi של המעבדה</strong>.</p>

            <p class="url-foot" id="targetUrl" translate="no" dir="ltr">---</p>
        </div>
    </div>

    <script>
        (function () {
            const urlParams = new URLSearchParams(window.location.search);
            let ip = urlParams.get("ip");

            if (!ip && window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (hash.includes("ip=")) {
                    const hashParams = new URLSearchParams(hash);
                    ip = hashParams.get("ip");
                } else {
                    ip = hash;
                }
            }

            if (!ip) {
                ip = window.location.hostname || "localhost";
            }

            const targetUrl = `http://${ip}/otef-interactive/remote-controller.html`;
            document.getElementById("targetUrl").textContent = targetUrl;

            const qrSize = 256;
            new QRCode(document.getElementById("qrcode"), {
                text: targetUrl,
                width: qrSize,
                height: qrSize,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H,
            });
        })();
    </script>
</body>
</html>
